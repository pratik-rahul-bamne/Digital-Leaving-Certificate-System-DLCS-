{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100" style="margin-top: -80px;">
    <div class="card card-soft border-0 shadow-lg p-4" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4 mt-2">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                style="width: 80px; height: 80px;">
                <i class="bi bi-key-fill fs-1"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1">Reset Password</h2>
            <p class="text-muted-custom">Enter your username and role to recover access</p>
        </div>

        <form method="POST" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="role" class="form-label fw-semibold text-muted-custom">Role</label>
                <select name="role" id="role" class="form-select form-control-lg" required>
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="username" class="form-label fw-semibold text-muted-custom">Username</label>
                <input type="text" id="username" name="username" class="form-control form-control-lg"
                    placeholder="Enter your username" required autocomplete="username"
                    value="{{ request.form.get('username', '') }}" />
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                    <i class="bi bi-envelope-paper me-2"></i>Reset Password
                </button>
            </div>
            <div class="text-center mt-4">
                <a href="{{ url_for('index') }}" class="text-decoration-none text-muted-custom small"><i
                        class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
